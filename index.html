<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>さんみん</title>
<link id="app-icon" rel="apple-touch-icon" href="https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Arc.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --line-bg: #efebe1;
  --line-header: #ffffff;
  --text: #1a1a1a;
  --text-muted: #888;
}

#intro {
  flex-shrink: 0;
  background: #fff;
  border-bottom: 1px solid #e8e4dc;
  padding: 16px 12px;
  overflow-y: auto;
}
#intro-header {
  text-align: center;
  margin-bottom: 14px;
}
#intro-header h2 {
  font-size: 18px;
  font-weight: 800;
  color: #1a1a1a;
  letter-spacing: 0.05em;
}
#intro-header p {
  font-size: 12px;
  color: #888;
  margin-top: 4px;
}
.char-cards {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.char-card {
  flex: 1;
  border-radius: 12px;
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.char-card.ray { background: #e8f1fb; }
.char-card.arc { background: #eaf3de; }
.char-card.shade { background: #f1f0ec; }
.char-card img {
  width: 52px; height: 52px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  background: #ddd;
}
.char-card-name {
  font-size: 12px;
  font-weight: 700;
  color: #1a1a1a;
}
.char-card-role {
  font-size: 10px;
  color: #555;
  text-align: center;
  line-height: 1.4;
}
.char-card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  justify-content: center;
}
.char-tag {
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 8px;
  font-weight: 600;
}
.ray .char-tag { background: #c8dff8; color: #0c447c; }
.arc .char-tag { background: #c8e8b4; color: #27500a; }
.shade .char-tag { background: #dddbd5; color: #444; }
#intro-close {
  display: block;
  width: 100%;
  padding: 10px;
  background: #06c755;
  color: white;
  border: none;
  border-radius: 22px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
}

html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: var(--line-bg); }
#app { display: flex; flex-direction: column; width: 100vw; height: 100dvh; overflow: hidden; }
#header {
  flex-shrink: 0;
  background: #fff;
  border-bottom: 1px solid #ddd;
  padding: 10px 12px;
  padding-top: max(10px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 6px;
  overflow: hidden;
}
#login-btn { display: flex; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; flex-shrink: 0; }
#login-btn h1 { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
#login-info { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge { padding: 2px 7px; border-radius: 12px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.badge.ray { background: #e8f1fb; color: #0c447c; }
.badge.arc { background: #eaf3de; color: #27500a; }
.badge.shade { background: #f1f0ec; color: #444; }
#ver-display { font-size: 9px; color: #ccc; white-space: nowrap; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
#budget-display { margin-left: auto; font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
#messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.msg-row { display: flex; gap: 6px; align-items: flex-end; width: 100%; }
.msg-row.user { flex-direction: row-reverse; }
.avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #ddd; }
.avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.avatar.user { background: #06c755; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; }
.bubble-col { display: flex; flex-direction: column; gap: 2px; max-width: calc(100% - 50px); min-width: 0; }
.char-name { font-size: 10px; color: var(--text-muted); padding: 0 4px; }
.msg-row.user .char-name { text-align: right; }
.bubble { padding: 8px 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; max-width: 100%; }
.bubble.ray, .bubble.arc, .bubble.shade {
  background: #fff;
  color: #1a1a1a;
  border-radius: 4px 18px 18px 18px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}
.bubble.user { background: #06c755; color: white; border-radius: 18px 4px 18px 18px; }
.typing-row { display: flex; gap: 6px; align-items: flex-end; }
.typing-bubble { background: white; border-radius: 4px 18px 18px 18px; padding: 10px 14px; display: flex; gap: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .15s; }
.dot:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
#error-banner { display: none; flex-shrink: 0; margin: 4px 10px; padding: 7px 11px; background: #fce8e8; border-radius: 8px; font-size: 12px; color: #a32d2d; }
#input-area {
  flex-shrink: 0;
  background: #f5f5f5;
  border-top: 1px solid #ddd;
  padding: 8px 10px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  gap: 6px;
  align-items: flex-end;
}
#input-box {
  flex: 1; resize: none;
  border: 1px solid #ddd; border-radius: 20px;
  padding: 8px 14px; font-size: 15px; font-family: inherit;
  background: white; color: var(--text); line-height: 1.5;
  min-height: 38px; max-height: 110px; overflow-y: auto; outline: none;
}
#input-box:focus { border-color: #06c755; }
#send-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: #06c755; color: white; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#send-btn:disabled { background: #ccc; cursor: not-allowed; }
.score-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; padding: 0 4px; }
.score-btn {
  background: none; border: 1px solid #ddd; border-radius: 12px;
  padding: 2px 8px; font-size: 11px; cursor: pointer; color: #888;
  display: flex; align-items: center; gap: 3px; transition: all 0.15s;
}
.score-btn:hover { background: #f5f5f5; }
.score-btn.liked { border-color: #06c755; color: #06c755; background: #eaf3de; }
.score-btn.disliked { border-color: #e57; color: #e57; background: #fce8e8; }
.char-star { font-size: 13px; color: #f5a623; margin-top: 4px; }
.char-star-count { font-size: 10px; color: #888; margin-left: 2px; }

</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="login-btn" title="タップして切り替え">
      <h1>さんみん</h1>
      <span id="login-info"></span>
    </button>
    <div class="badges">
      <span class="badge ray">Ray</span>
      <span class="badge arc">Arc</span>
      <span class="badge shade">Shade</span>
    </div>
    <span id="ver-display">2026-04-07 16:02</span>
    <span id="budget-display"></span>
  </div>
  <div id="intro">
    <div id="intro-header">
      <h2>さんみん</h2>
      <p>3人のAIが、あなたの話を一緒に考えます</p>
    </div>
    <div class="char-cards">
      <div class="char-card ray">
        <img src="https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Ray.png" alt="Ray">
        <div class="char-card-name">Ray レイ</div>
        <div class="char-card-role">事実を冷静に整理する<br>分析担当</div>
        <div class="char-star" id="star-ray"><span style="color:#ccc;font-size:11px">評価なし</span></div>
        <div class="char-card-tags">
          <span class="char-tag">論理的</span>
          <span class="char-tag">データ重視</span>
          <span class="char-tag">端的</span>
        </div>
      </div>
      <div class="char-card arc">
        <img src="https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Arc.png" alt="Arc">
        <div class="char-card-name">Arc アーク</div>
        <div class="char-card-role">気持ちに寄り添う<br>共感担当</div>
        <div class="char-star" id="star-arc"><span style="color:#ccc;font-size:11px">評価なし</span></div>
        <div class="char-card-tags">
          <span class="char-tag">穏やか</span>
          <span class="char-tag">共感</span>
          <span class="char-tag">わかりやすい</span>
        </div>
      </div>
      <div class="char-card shade">
        <img src="https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Shade.png" alt="Shade">
        <div class="char-card-name">Shade シェイド</div>
        <div class="char-card-role">問題点を鋭く突く<br>辛口担当</div>
        <div class="char-star" id="star-shade"><span style="color:#ccc;font-size:11px">評価なし</span></div>
        <div class="char-card-tags">
          <span class="char-tag">皮肉屋</span>
          <span class="char-tag">本質をつく</span>
          <span class="char-tag">ため口</span>
        </div>
      </div>
    </div>
    <button id="intro-close" onclick="document.getElementById('intro').style.display='none'">3人と話してみる →</button>
  </div>
  <div id="messages"></div>
  <div id="error-banner"></div>
  <div id="input-area">
    <textarea id="input-box" placeholder="メッセージを入力..." rows="1"></textarea>
    <button id="send-btn">↑</button>
  </div>
</div>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwz9QAgg6E0ZmgAR4echwbbPKvL5LoNg5lAqJdfjv-pIWY6ADJzDGy-ALcMZVlsfMHs/exec';
const NAMES = { ray: 'Ray レイ', arc: 'Arc アーク', shade: 'Shade シェイド' };
const IMAGES = {
  ray: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Ray.png',
  arc: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Arc.png',
  shade: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Shade.png',
};
const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('input-box');
const sendBtn = document.getElementById('send-btn');
const errorBanner = document.getElementById('error-banner');
const budgetEl = document.getElementById('budget-display');
const loginInfo = document.getElementById('login-info');
let currentMode = 'chat';

function getUserName() { return localStorage.getItem('yakusoku_username') || ''; }
function setUserName(n) { localStorage.setItem('yakusoku_username', n); }
function clearUserName() { localStorage.removeItem('yakusoku_username'); }
function updateLoginInfo() { loginInfo.textContent = getUserName() || ''; }

document.getElementById('login-btn').addEventListener('click', () => {
  if (confirm('別のアカウントでログインしますか？')) {
    clearUserName(); msgsEl.innerHTML = ''; switchToNameInput();
  }
});

function showError(msg) { errorBanner.style.display = 'block'; errorBanner.textContent = msg; }
function hideError() { errorBanner.style.display = 'none'; }

function addMsg(char, text) {
  const isUser = char === 'user';
  const row = document.createElement('div');
  row.className = 'msg-row' + (isUser ? ' user' : '');
  const av = document.createElement('div');
  av.className = 'avatar' + (isUser ? ' user' : '');
  if (!isUser && IMAGES[char]) {
    const img = document.createElement('img'); img.src = IMAGES[char]; img.alt = char; av.appendChild(img);
  } else if (isUser) {
    av.textContent = (getUserName() || 'く').slice(0, 1);
  }
  const col = document.createElement('div'); col.className = 'bubble-col';
  const nm = document.createElement('span'); nm.className = 'char-name';
  nm.textContent = isUser ? (getUserName() || 'あなた') : (NAMES[char] || char);
  const bubble = document.createElement('div'); bubble.className = 'bubble ' + char;
  bubble.textContent = text;
  col.appendChild(nm); col.appendChild(bubble);
  if (!isUser) { row.appendChild(av); row.appendChild(col); }
  else { row.appendChild(col); row.appendChild(av); }
  msgsEl.appendChild(row);

  // AIの吹き出しにスコアボタン追加
  if (!isUser && ['ray','arc','shade'].includes(char)) {
    const scoreRow = document.createElement('div');
    scoreRow.className = 'score-row';
    scoreRow.style.paddingLeft = '48px';
    const likeBtn = document.createElement('button');
    likeBtn.className = 'score-btn';
    likeBtn.innerHTML = '👍 <span>0</span>';
    const dislikeBtn = document.createElement('button');
    dislikeBtn.className = 'score-btn';
    dislikeBtn.innerHTML = '👎 <span>0</span>';
    let voted = false;
    likeBtn.addEventListener('click', () => {
      if (voted) return;
      voted = true;
      likeBtn.classList.add('liked');
      sendScore(char, 'like', likeBtn.querySelector('span'), dislikeBtn.querySelector('span'));
    });
    dislikeBtn.addEventListener('click', () => {
      if (voted) return;
      voted = true;
      dislikeBtn.classList.add('disliked');
      sendScore(char, 'dislike', likeBtn.querySelector('span'), dislikeBtn.querySelector('span'));
    });
    const replyBtn = document.createElement('button');
    replyBtn.className = 'score-btn';
    replyBtn.innerHTML = '↩ 返信';
    replyBtn.addEventListener('click', () => {
      const tag = '@' + char.charAt(0).toUpperCase() + char.slice(1) + ' ';
      inputEl.value = tag;
      inputEl.focus();
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
    });
    scoreRow.appendChild(likeBtn);
    scoreRow.appendChild(dislikeBtn);
    scoreRow.appendChild(replyBtn);
    msgsEl.appendChild(scoreRow);
  }

  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function addTyping(id) {
  const row = document.createElement('div'); row.className = 'typing-row'; row.id = id;
  const av = document.createElement('div'); av.className = 'avatar';
  const tb = document.createElement('div'); tb.className = 'typing-bubble';
  for (let i = 0; i < 3; i++) { const d = document.createElement('div'); d.className = 'dot'; tb.appendChild(d); }
  row.appendChild(av); row.appendChild(tb); msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }

function updateBudget(b) {
  if (!b) return;
  const used = b.usedJPY || 0;
  const limit = b.limitJPY || 500;
  const remaining = b.remainingJPY;
  const pct = Math.round(used / limit * 100);
  budgetEl.textContent = '¥' + used + ' / ¥' + limit + ' (' + pct + '%)';
  budgetEl.style.color = remaining < 100 ? '#e00' : remaining < 200 ? '#e87' : '#888';
}


function sendScore(char, type, likeSpan, dislikeSpan) {
  const cb = 'score_' + Date.now();
  const url = GAS_URL + '?callback=' + cb + '&action=score&char=' + char + '&type=' + type + '&user=' + encodeURIComponent(getUserName() || 'guest');
  const cleanup = () => { delete window[cb]; document.getElementById('s_' + cb)?.remove(); };
  window[cb] = function(data) {
    cleanup();
    if (data.scores) {
      updateIntroScores(data.scores);
      if (data.favChar) window._favChar = data.favChar;
      const s = data.scores[char];
      if (s) {
        likeSpan.textContent = s.like;
        dislikeSpan.textContent = s.dislike;
      }
    }
  };
  const s = document.createElement('script');
  s.id = 's_' + cb;
  s.src = url;
  document.body.appendChild(s);
}

function loadScores() {
  const cb = 'getscore_' + Date.now();
  const url = GAS_URL + '?callback=' + cb + '&action=getscores&user=' + encodeURIComponent(getUserName() || 'guest');
  const cleanup = () => { delete window[cb]; document.getElementById('s_' + cb)?.remove(); };
  window[cb] = function(data) { cleanup(); if (data.scores) updateIntroScores(data.scores); if (data.favChar) window._favChar = data.favChar; };
  const s = document.createElement('script');
  s.id = 's_' + cb;
  s.src = url;
  document.body.appendChild(s);
}

function updateIntroScores(scores) {
  ['ray','arc','shade'].forEach(char => {
    const el = document.getElementById('star-' + char);
    if (!el) return;
    const s = scores[char];
    if (!s || s.total === 0) { el.innerHTML = '<span style="color:#ccc;font-size:11px">評価なし</span>'; return; }
    const full = Math.floor(s.star);
    const half = (s.star - full) >= 0.5 ? 1 : 0;
    const empty = 5 - full - half;
    el.innerHTML = '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty) +
      '<span class="char-star-count">(' + s.star.toFixed(1) + ')</span>' +
      '<div style="font-size:10px;color:#888;margin-top:2px">👍' + s.like + ' 👎' + s.dislike + '</div>';
  });
}

function callAPI(userMessage) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const sid = 'jsonp_' + cb;
    const url = GAS_URL + '?callback=' + cb + '&action=chat&user=' + encodeURIComponent(getUserName() || 'anonymous') + '&message=' + encodeURIComponent(userMessage);
    const cleanup = () => { delete window[cb]; document.getElementById(sid)?.remove(); };
    const timer = setTimeout(() => { cleanup(); reject(new Error('タイムアウトしました')); }, 35000);
    window[cb] = function(data) {
      clearTimeout(timer); cleanup();
      if (data.error === 'BUDGET_EXCEEDED') return reject(new Error(data.message));
      if (data.error) return reject(new Error(data.message || data.error));
      if (data.budget) updateBudget(data.budget);
      resolve(data.reply || '');
    };
    const s = document.createElement('script'); s.id = sid; s.src = url;
    s.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error('通信エラーが発生しました')); };
    document.body.appendChild(s);
  });
}

function parseReplies(raw, fallbackChar) {
  fallbackChar = fallbackChar || 'arc';

  // JSON配列パース（複数パターン対応）
  try {
    // そのままJSONとして試みる
    const trimmed = raw.trim();
    if (trimmed.startsWith('[')) {
      const a = JSON.parse(trimmed);
      if (Array.isArray(a) && a.length > 0) return a;
    }
  } catch(e) {}

  try {
    // []を含む部分を抽出
    const m = raw.match(/\[[\s\S]*\]/);
    if (m) {
      const a = JSON.parse(m[0]);
      if (Array.isArray(a) && a.length > 0) return a;
    }
  } catch(e) {}

  // "ray:... / arc:... / shade:..." 形式パース
  if (raw.includes(' / ')) {
    const parts = raw.split(' / ');
    const result = [];
    for (const part of parts) {
      const colon = part.indexOf(':');
      if (colon > 0) {
        const char = part.slice(0, colon).trim().toLowerCase();
        const message = part.slice(colon + 1).trim();
        if (['ray','arc','shade'].includes(char)) {
          result.push({ char, message });
        }
      }
    }
    if (result.length > 0) return result;
  }

  return [{ char: fallbackChar, message: raw }];
}

async function runConversation(userText) {
  hideError(); sendBtn.disabled = true;
  addMsg('user', userText); addTyping('typing');

  // メンションキャラを検出（フォールバック用）
  const mentionMatch = userText.match(/@(Ray|Arc|Shade)/i);
  const fallbackChar = mentionMatch ? mentionMatch[1].toLowerCase() : 'arc';

  try {
    const raw = await callAPI(userText);
    removeTyping('typing');
    const replies = parseReplies(raw, fallbackChar);
    replies.forEach(r => addMsg(r.char, r.message));
  } catch(err) {
    removeTyping('typing'); showError(err.message || 'エラーが発生しました');
  }
  sendBtn.disabled = false; inputEl.focus();
}

sendBtn.addEventListener('click', handleSend);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing && currentMode === 'name_input' && !e.shiftKey) {
    e.preventDefault(); handleSend();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
});

function handleSend() { currentMode === 'name_input' ? submitName() : submitChat(); }

function submitName() {
  const name = inputEl.value.trim(); if (!name) return;
  setUserName(name); inputEl.value = ''; inputEl.style.height = 'auto';
  inputEl.placeholder = 'メッセージを入力...';
  currentMode = 'chat'; updateLoginInfo();
  addMsg('arc', 'よろしく、' + getDisplayName() + '！何でも話しかけてね。');
}

function submitChat() {
  const t = inputEl.value.trim(); if (!t || sendBtn.disabled) return;
  inputEl.value = ''; inputEl.style.height = 'auto'; runConversation(t);
}

function switchToNameInput() {
  inputEl.placeholder = 'あなたのお名前を入力...';
  currentMode = 'name_input'; updateLoginInfo();
  addMsg('arc', 'はじめまして！あなたのお名前を教えてください。');
}

function getSuffix() { return localStorage.getItem('yakusoku_suffix') || 'さん'; }
function setSuffix(s) { localStorage.setItem('yakusoku_suffix', s); }
function getDisplayName() { return getUserName() + getSuffix(); }

(function init() {
  const params = new URLSearchParams(window.location.search);
  const urlUser = params.get('user');
  const urlSuffix = params.get('suffix');
  const urlIcon = params.get('icon');
  if (urlIcon && ['ray','arc','shade'].includes(urlIcon.toLowerCase())) {
    const iconUrl = 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/' +
      urlIcon.charAt(0).toUpperCase() + urlIcon.slice(1).toLowerCase() + '.png';
    document.getElementById('app-icon').href = iconUrl;
    if (urlIcon === 'ray') document.title = 'さんみん - Ray';
    else if (urlIcon === 'shade') document.title = 'さんみん - Shade';
  }

  if (urlUser) {
    setUserName(urlUser);
    if (urlSuffix) setSuffix(urlSuffix);
    currentMode = 'chat';
    updateLoginInfo();
    const fav1 = window._favChar || 'arc';
    addMsg(fav1, 'おかえり、' + getDisplayName() + '！今日はどんなことを話しましょうか？');
  } else {
    const name = getUserName();
    if (name) { currentMode = 'chat'; updateLoginInfo();
      const fav2 = window._favChar || 'arc';
      addMsg(fav2, 'おかえり、' + getDisplayName() + '！今日はどんなことを話しましょうか？');
    }
    else { switchToNameInput(); }
  }
  loadScores();
})();
</script>
</body>
</html>
