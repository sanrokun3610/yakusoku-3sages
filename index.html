<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薬速3賢者</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text-muted: #666;
    --ray-bg: #e8f1fb;
    --ray-text: #0c447c;
    --ray-border: #b5d4f4;
    --arc-bg: #eaf3de;
    --arc-text: #27500a;
    --arc-border: #c0dd97;
    --shade-bg: #f1f0ec;
    --shade-text: #3a3a38;
    --shade-border: #d3d1c7;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--bg);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 680px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }

  /* ヘッダー */
  #header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-right: 4px;
  }
  .badge {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .badge.ray { background: var(--ray-bg); color: var(--ray-text); border-color: var(--ray-border); }
  .badge.arc { background: var(--arc-bg); color: var(--arc-text); border-color: var(--arc-border); }
  .badge.shade { background: var(--shade-bg); color: var(--shade-text); border-color: var(--shade-border); }
  #budget-display {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* メッセージエリア */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    animation: fadeIn 0.2s ease;
  }
  .msg-row.user { flex-direction: row-reverse; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    flex-shrink: 0;
    letter-spacing: -0.3px;
    overflow: hidden;
    border: 1.5px solid var(--border);
  }
  .avatar img {
    width: 100%;
    height: 130%;
    object-fit: cover;
    object-position: top;
    margin-top: 0;
  }
  .avatar.ray { background: var(--ray-bg); color: var(--ray-text); border-color: var(--ray-border); }
  .avatar.arc { background: var(--arc-bg); color: var(--arc-text); border-color: var(--arc-border); }
  .avatar.shade { background: var(--shade-bg); color: var(--shade-text); border-color: var(--shade-border); }
  .avatar.user { background: #e0ddd6; color: #555; border-color: #ccc; }

  .bubble-wrap {
    display: flex; flex-direction: column; gap: 3px;
    max-width: min(75%, 480px);
  }
  .char-name {
    font-size: 10px; color: var(--text-muted);
    padding: 0 4px;
  }
  .msg-row.user .char-name { text-align: right; }

  .bubble {
    padding: 9px 13px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    border: 1px solid var(--border);
    background: #f0ede8;
    color: var(--text);
    word-break: break-word;
  }
  .bubble.ray { background: var(--ray-bg); border-color: var(--ray-border); color: var(--ray-text); border-radius: 4px 16px 16px 16px; }
  .bubble.arc { background: var(--arc-bg); border-color: var(--arc-border); color: var(--arc-text); border-radius: 4px 16px 16px 16px; }
  .bubble.shade { background: var(--shade-bg); border-color: var(--shade-border); color: var(--shade-text); border-radius: 4px 16px 16px 16px; }
  .bubble.user { border-radius: 16px 4px 16px 16px; }

  /* タイピング */
  .typing-wrap {
    display: flex; gap: 8px; align-items: center;
  }
  .typing-bubble {
    display: flex; gap: 5px; padding: 10px 14px;
    background: #f0ede8; border-radius: 4px 16px 16px 16px;
    border: 1px solid var(--border);
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #aaa;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  /* エラーバナー */
  #error-banner {
    display: none;
    margin: 0 16px 8px;
    padding: 8px 12px;
    background: #fce8e8;
    border: 1px solid #f5c0c0;
    border-radius: 8px;
    font-size: 12px;
    color: #a32d2d;
    flex-shrink: 0;
  }

  /* 入力エリア */
  #input-area {
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
    background: var(--surface);
  }
  #input-box {
    flex: 1; resize: none;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 9px 14px;
    font-size: 14px;
    font-family: inherit;
    background: #faf9f7;
    color: var(--text);
    line-height: 1.5;
    min-height: 40px; max-height: 120px;
    overflow-y: auto;
    outline: none;
    transition: border-color 0.15s;
  }
  #input-box:focus { border-color: #378ADD; }
  #send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: #378ADD;
    color: white;
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  #send-btn:hover { background: #185FA5; }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>薬速3賢者</h1>
    <span class="badge ray">Ray</span>
    <span class="badge arc">Arc</span>
    <span class="badge shade">Shade</span>
    <span id="budget-display"></span>
  </div>

  <div id="messages"></div>

  <div id="error-banner" id="error-banner"></div>

  <div id="input-area">
    <textarea id="input-box" placeholder="3賢者に相談する..." rows="1"></textarea>
    <button id="send-btn" title="送信">↑</button>
  </div>
</div>

<script>
// ============================================================
// 設定
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwz9QAgg6E0ZmgAR4echwbbPKvL5LoNg5lAqJdfjv-pIWY6ADJzDGy-ALcMZVlsfMHs/exec';

const SYSTEM = `薬速3賢者のRay・Arc・Shadeを同時に演じる。くまさん（薬剤師・医療ITコンサルタント）の相談に3人全員が発言する「3人会議」形式で答える。

Ray：白衣・丸眼鏡。事実確認・冷静厳密。データ重視。無駄な言葉を削ぐ。
Arc：白衣か柔らか服・緑系。穏やか共感・わかりやすさ。くまさんに寄り添う。
Shade：フードパーカー・黒グレー・細眼鏡。辛口・皮肉屋・ため口。問題点を突く。

JSON配列のみで返答（前後テキスト不要）：
[{"char":"ray","message":"..."},{"char":"arc","message":"..."},{"char":"shade","message":"..."}]

3人の発言は噛み合うように。話題に応じて発言順を変えてもよい。`;

const NAMES = { ray: 'Ray レイ', arc: 'Arc アーク', shade: 'Shade シェイド' };
const AVATARS = { ray: 'Ray', arc: 'Arc', shade: 'Shd' };

// ============================================================
// 状態
// ============================================================
let history = [];
const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('input-box');
const sendBtn = document.getElementById('send-btn');
const errorBanner = document.getElementById('error-banner');
const budgetEl = document.getElementById('budget-display');

// ============================================================
// UI ヘルパー
// ============================================================
function showError(msg) {
  errorBanner.style.display = 'block';
  errorBanner.textContent = msg;
}
function hideError() { errorBanner.style.display = 'none'; }

const IMAGES = {
  ray: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Ray.png',
  arc: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Arc.png',
  shade: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Shade.png',
};

function addMsg(char, text) {
  const isUser = char === 'user';
  const row = document.createElement('div');
  row.className = 'msg-row' + (isUser ? ' user' : '');

  const av = document.createElement('div');
  av.className = 'avatar ' + char;

  if (!isUser && IMAGES[char]) {
    const img = document.createElement('img');
    img.src = IMAGES[char];
    img.alt = char;
    av.appendChild(img);
  } else {
    av.textContent = isUser ? 'くま' : (AVATARS[char] || char);
  }

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const name = document.createElement('span');
  name.className = 'char-name';
  name.textContent = isUser ? 'くまさん' : (NAMES[char] || char);

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + char;
  bubble.textContent = text;

  wrap.appendChild(name);
  wrap.appendChild(bubble);
  row.appendChild(av);
  row.appendChild(wrap);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function addTyping(id) {
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = id;

  const av = document.createElement('div');
  av.className = 'avatar arc';
  av.textContent = '...';

  const tb = document.createElement('div');
  tb.className = 'typing-bubble';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    tb.appendChild(d);
  }

  wrap.appendChild(av);
  wrap.appendChild(tb);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function removeTyping(id) { document.getElementById(id)?.remove(); }

function updateBudget(budget) {
  if (!budget) return;
  const jpy = budget.remainingJPY;
  budgetEl.textContent = `残り¥${jpy}`;
  budgetEl.style.color = jpy < 100 ? '#a32d2d' : '#888';
}

// ============================================================
// API 呼び出し（JSONP方式 - GASのCORS制約を回避）
// ============================================================
function callAPI(messages) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const scriptId = 'jsonp_' + callbackName;

    const payload = encodeURIComponent(JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM,
      messages,
    }));

    const url = GAS_URL + '?callback=' + callbackName + '&payload=' + payload;

    const cleanup = () => {
      delete window[callbackName];
      document.getElementById(scriptId)?.remove();
    };

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('タイムアウトしました。もう一度試してください。'));
    }, 30000);

    window[callbackName] = function(data) {
      clearTimeout(timer);
      cleanup();

      if (data.error === 'BUDGET_EXCEEDED') {
        return reject(new Error(data.message));
      }
      if (data.error) {
        return reject(new Error(data.message || data.error));
      }
      if (data._budget) updateBudget(data._budget);

      const raw = data.content?.map(i => i.text || '').join('') || '';
      resolve(raw);
    };

    const script = document.createElement('script');
    script.id = scriptId;
    script.src = url;
    script.onerror = () => {
      clearTimeout(timer);
      cleanup();
      reject(new Error('通信エラーが発生しました'));
    };
    document.body.appendChild(script);
  });
}

function parseReplies(raw) {
  try {
    const clean = raw.replace(/```json|```/g, '').trim();
    const arr = JSON.parse(clean);
    if (Array.isArray(arr)) return arr;
  } catch (e) {}
  return [{ char: 'arc', message: raw }];
}

// ============================================================
// 会話処理
// ============================================================
async function runConversation(userText) {
  hideError();
  sendBtn.disabled = true;

  addMsg('user', userText);
  const newMessages = [...history, { role: 'user', content: userText }];

  addTyping('typing');

  try {
    const raw = await callAPI(newMessages);
    removeTyping('typing');

    const replies = parseReplies(raw);
    replies.forEach(r => addMsg(r.char, r.message));

    // historyにはJSON全体ではなく圧縮テキストを保存（URL長対策）
    const compressed = replies.map(r => r.char + ':' + r.message).join(' / ');
    history = [...newMessages, { role: 'assistant', content: compressed }];

    // 履歴を直近4ターンに制限
    if (history.length > 8) history = history.slice(history.length - 8);

  } catch (err) {
    removeTyping('typing');
    showError(err.message || 'エラーが発生しました。');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

// ============================================================
// イベント
// ============================================================
sendBtn.addEventListener('click', () => {
  const t = inputEl.value.trim();
  if (!t || sendBtn.disabled) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  runConversation(t);
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ============================================================
// 初期メッセージ
// ============================================================
(function init() {
  addMsg('arc', 'こんにちは、くまさん！今日はどんなことを話しましょうか？');
})();
</script>
</body>
</html>
