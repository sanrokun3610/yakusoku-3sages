<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>さんみん</title>
<link id="app-icon" rel="apple-touch-icon" href="https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Arc.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #efebe1;
  --bg-secondary: #f5f3ee;
  --header-bg: #ffffff;
  --text: #1a1a1a;
  --text-muted: #888;
  --border: #ddd;
  --border-light: #e8e4dc;
  --border-subtle: #e0ddd5;
  --accent: #06c755;
  --ray-bg: #e8f1fb;
  --ray-text: #0c447c;
  --ray-bar: #378ADD;
  --arc-bg: #eaf3de;
  --arc-text: #27500a;
  --arc-bar: #639922;
  --shade-bg: #f1f0ec;
  --shade-text: #444;
  --shade-bar: #888780;
  --error-bg: #fce8e8;
  --error-text: #a32d2d;
}

html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: var(--bg); }
#app { display: flex; flex-direction: column; width: 100vw; height: 100dvh; overflow: hidden; }

/* === Header === */
#header {
  flex-shrink: 0;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  padding-top: max(10px, env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 6px;
  overflow: hidden;
}
#login-btn { display: flex; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; flex-shrink: 0; }
#login-btn h1 { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
#login-info { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge { padding: 2px 7px; border-radius: 12px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.badge.ray { background: var(--ray-bg); color: var(--ray-text); }
.badge.arc { background: var(--arc-bg); color: var(--arc-text); }
.badge.shade { background: var(--shade-bg); color: var(--shade-text); }
#ver-display { font-size: 9px; color: #ccc; white-space: nowrap; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
#budget-display { margin-left: auto; font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

/* === Weather Bar === */
#weather-bar {
  flex-shrink: 0;
  background: linear-gradient(135deg, #e3f0ff 0%, #f0f7ff 100%);
  border-bottom: 1px solid var(--border-light);
  padding: 8px 12px;
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text);
  overflow-x: auto;
  white-space: nowrap;
}
#weather-bar.visible { display: flex; }
.weather-icon { font-size: 22px; flex-shrink: 0; }
.weather-main { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
.weather-area { font-size: 10px; color: var(--text-muted); }
.weather-desc { font-size: 13px; font-weight: 600; }
.weather-temps { display: flex; gap: 6px; align-items: center; flex-shrink: 0; margin-left: 4px; }
.weather-temp-high { color: #d44; font-weight: 700; font-size: 14px; }
.weather-temp-low { color: #38a; font-weight: 700; font-size: 14px; }
.weather-sep { color: var(--border); font-size: 16px; margin: 0 4px; }
.weather-tomorrow { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.weather-tomorrow-icon { font-size: 16px; }

/* === Daily Section === */
#daily-section {
  flex-shrink: 0;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-light);
  padding: 10px 12px;
  display: none;
}
#daily-section .daily-title {
  font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-align: center;
}
.daily-row { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 6px; }
.daily-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #ddd; }
.daily-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.daily-bubble {
  flex: 1; background: white; border-radius: 10px; padding: 6px 10px;
  font-size: 13px; color: var(--text); line-height: 1.5;
  border: 0.5px solid var(--border-subtle);
}
.daily-heat-row { padding-left: 34px; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

/* === Intro Panel === */
#intro {
  flex-shrink: 0;
  background: #fff;
  border-bottom: 1px solid var(--border-light);
  padding: 16px 12px;
  overflow-y: auto;
}
#intro-header { text-align: center; margin-bottom: 14px; }
#intro-header h2 { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: 0.05em; }
#intro-header p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.char-cards { display: flex; gap: 8px; margin-bottom: 14px; }
.char-card {
  flex: 1; border-radius: 12px; padding: 10px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.char-card.ray { background: var(--ray-bg); }
.char-card.arc { background: var(--arc-bg); }
.char-card.shade { background: var(--shade-bg); }
.char-card img {
  width: 52px; height: 52px; border-radius: 50%;
  object-fit: cover; object-position: center top; background: #ddd;
}
.char-card-name { font-size: 12px; font-weight: 700; color: var(--text); }
.char-card-role { font-size: 10px; color: #555; text-align: center; line-height: 1.4; }
.char-card-tags { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; }
.char-tag { font-size: 9px; padding: 2px 5px; border-radius: 8px; font-weight: 600; }
.ray .char-tag { background: #c8dff8; color: var(--ray-text); }
.arc .char-tag { background: #c8e8b4; color: var(--arc-text); }
.shade .char-tag { background: #dddbd5; color: var(--shade-text); }
#intro-close {
  display: block; width: 100%; padding: 10px;
  background: var(--accent); color: white; border: none; border-radius: 22px;
  font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.05em;
}
.char-star { font-size: 13px; color: #f5a623; margin-top: 4px; }
.char-star-count { font-size: 10px; color: var(--text-muted); margin-left: 2px; }

/* === Messages === */
#messages {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 12px 10px; display: flex; flex-direction: column; gap: 8px;
}
.msg-row { display: flex; gap: 6px; align-items: flex-end; width: 100%; }
.msg-row.user { flex-direction: row-reverse; }
.avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #ddd; }
.avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.avatar.user { background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; }
.bubble-col { display: flex; flex-direction: column; gap: 2px; max-width: calc(100% - 50px); min-width: 0; }
.char-name { font-size: 10px; color: var(--text-muted); padding: 0 4px; }
.msg-row.user .char-name { text-align: right; }
.bubble { padding: 8px 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; max-width: 100%; }
.bubble.ray, .bubble.arc, .bubble.shade {
  background: #fff; color: var(--text);
  border-radius: 4px 18px 18px 18px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}
.bubble.user { background: var(--accent); color: white; border-radius: 18px 4px 18px 18px; }

/* === Typing === */
.typing-row { display: flex; gap: 6px; align-items: flex-end; }
.typing-bubble { background: white; border-radius: 4px 18px 18px 18px; padding: 10px 14px; display: flex; gap: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .15s; }
.dot:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

/* === Heat bar === */
.heat-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; padding-left: 48px; }
.heat-bar-bg { flex: 1; height: 5px; background: var(--border-subtle); border-radius: 3px; overflow: hidden; }
.heat-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.heat-num { font-size: 11px; width: 22px; text-align: right; }

/* === Score === */
.score-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; padding: 0 4px; }
.score-btn {
  background: none; border: 1px solid var(--border); border-radius: 12px;
  padding: 2px 8px; font-size: 11px; cursor: pointer; color: var(--text-muted);
  display: flex; align-items: center; gap: 3px; transition: all 0.15s;
}
.score-btn:hover { background: #f5f5f5; }
.score-btn.liked { border-color: var(--accent); color: var(--accent); background: var(--arc-bg); }
.score-btn.disliked { border-color: #e57; color: #e57; background: var(--error-bg); }

/* === Error Banner (D) === */
#error-banner {
  display: none; flex-shrink: 0; margin: 4px 10px; padding: 7px 11px;
  background: var(--error-bg); border-radius: 8px; font-size: 12px; color: var(--error-text);
  align-items: center; gap: 6px;
}
#error-banner.visible { display: flex; }
#error-banner-text { flex: 1; }
#error-close-btn {
  background: none; border: none; cursor: pointer; font-size: 16px;
  color: var(--error-text); padding: 0 2px; flex-shrink: 0; line-height: 1;
}

/* === Input Area === */
#input-area {
  flex-shrink: 0; background: #f5f5f5; border-top: 1px solid var(--border);
  padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex; gap: 6px; align-items: flex-end;
}
#input-box {
  flex: 1; resize: none;
  border: 1px solid var(--border); border-radius: 20px;
  padding: 8px 14px; font-size: 15px; font-family: inherit;
  background: white; color: var(--text); line-height: 1.5;
  min-height: 38px; max-height: 110px; overflow-y: auto; outline: none;
}
#input-box:focus { border-color: var(--accent); }
#send-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--accent); color: white; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#send-btn:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="login-btn" title="タップして切り替え">
      <h1>さんみん</h1>
      <span id="login-info"></span>
    </button>
    <div class="badges">
      <span class="badge ray">Ray</span>
      <span class="badge arc">Arc</span>
      <span class="badge shade">Shade</span>
    </div>
    <span id="ver-display">2026-04-07</span>
    <span id="budget-display"></span>
  </div>

  <!-- 天気予報バー -->
  <div id="weather-bar">
    <span class="weather-icon" id="weather-icon"></span>
    <div class="weather-main">
      <span class="weather-area" id="weather-area"></span>
      <span class="weather-desc" id="weather-desc"></span>
    </div>
    <div class="weather-temps">
      <span class="weather-temp-high" id="weather-high"></span>
      <span style="color:#aaa">/</span>
      <span class="weather-temp-low" id="weather-low"></span>
    </div>
    <span class="weather-sep">│</span>
    <div class="weather-tomorrow">
      <span>明日</span>
      <span class="weather-tomorrow-icon" id="weather-tomorrow-icon"></span>
      <span id="weather-tomorrow-desc"></span>
    </div>
  </div>

  <div id="daily-section">
    <div class="daily-title">今日の3人</div>
    <div id="daily-content"></div>
  </div>

  <div id="intro">
    <div id="intro-header">
      <h2>さんみん</h2>
      <p>3人のAIが、あなたの話を一緒に考えます</p>
    </div>
    <div class="char-cards">
      <div class="char-card ray">
        <img src="https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Ray.png" alt="Ray">
        <div class="char-card-name">Ray レイ</div>
        <div class="char-card-role">事実を冷静に整理する<br>分析担当</div>
        <div class="char-star" id="star-ray"><span style="color:#ccc;font-size:11px">評価なし</span></div>
        <div class="char-card-tags">
          <span class="char-tag">論理的</span>
          <span class="char-tag">データ重視</span>
          <span class="char-tag">端的</span>
        </div>
      </div>
      <div class="char-card arc">
        <img src="https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Arc.png" alt="Arc">
        <div class="char-card-name">Arc アーク</div>
        <div class="char-card-role">気持ちに寄り添う<br>共感担当</div>
        <div class="char-star" id="star-arc"><span style="color:#ccc;font-size:11px">評価なし</span></div>
        <div class="char-card-tags">
          <span class="char-tag">穏やか</span>
          <span class="char-tag">共感</span>
          <span class="char-tag">わかりやすい</span>
        </div>
      </div>
      <div class="char-card shade">
        <img src="https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Shade.png" alt="Shade">
        <div class="char-card-name">Shade シェイド</div>
        <div class="char-card-role">問題点を鋭く突く<br>辛口担当</div>
        <div class="char-star" id="star-shade"><span style="color:#ccc;font-size:11px">評価なし</span></div>
        <div class="char-card-tags">
          <span class="char-tag">皮肉屋</span>
          <span class="char-tag">本質をつく</span>
          <span class="char-tag">ため口</span>
        </div>
      </div>
    </div>
    <button id="intro-close">3人と話してみる →</button>
  </div>

  <div id="messages"></div>

  <div id="error-banner">
    <span id="error-banner-text"></span>
    <button id="error-close-btn" title="閉じる">×</button>
  </div>

  <div id="input-area">
    <textarea id="input-box" placeholder="メッセージを入力..." rows="1"></textarea>
    <button id="send-btn">↑</button>
  </div>
</div>

<script>
// === Constants ===
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwz9QAgg6E0ZmgAR4echwbbPKvL5LoNg5lAqJdfjv-pIWY6ADJzDGy-ALcMZVlsfMHs/exec';
const JMA_FORECAST_URL = 'https://www.jma.go.jp/bosai/forecast/data/forecast/';
const NAMES = { ray: 'Ray レイ', arc: 'Arc アーク', shade: 'Shade シェイド' };
const IMAGES = {
  ray: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Ray.png',
  arc: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Arc.png',
  shade: 'https://raw.githubusercontent.com/sanrokun3610/yakusoku-3sages/main/Shade.png',
};
const CHARS = ['ray', 'arc', 'shade'];
const HEAT_COLORS = { ray: '#378ADD', arc: '#639922', shade: '#888780' };

// === DOM refs ===
const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('input-box');
const sendBtn = document.getElementById('send-btn');
const errorBanner = document.getElementById('error-banner');
const errorBannerText = document.getElementById('error-banner-text');
const budgetEl = document.getElementById('budget-display');
const loginInfo = document.getElementById('login-info');

// === State ===
let currentMode = 'chat';
let isSending = false; // (E) 二重送信防止フラグ

// === User helpers ===
function getUserName() { return localStorage.getItem('yakusoku_username') || ''; }
function setUserName(n) { localStorage.setItem('yakusoku_username', n); }
function clearUserName() { localStorage.removeItem('yakusoku_username'); }
function getSuffix() { return localStorage.getItem('yakusoku_suffix') || 'さん'; }
function setSuffix(s) { localStorage.setItem('yakusoku_suffix', s); }
function getDisplayName() { return getUserName() + getSuffix(); }
function updateLoginInfo() { loginInfo.textContent = getUserName() || ''; }

// === Error Banner (D) 自動非表示 + 閉じるボタン ===
let errorTimer = null;
function showError(msg) {
  clearTimeout(errorTimer);
  errorBannerText.textContent = msg;
  errorBanner.classList.add('visible');
  errorTimer = setTimeout(hideError, 8000);
}
function hideError() {
  clearTimeout(errorTimer);
  errorBanner.classList.remove('visible');
}
document.getElementById('error-close-btn').addEventListener('click', hideError);

// === (G) 熱量バー生成を共通関数化 ===
function createHeatBar(char, heat, paddingLeft) {
  const row = document.createElement('div');
  row.className = 'heat-row';
  if (paddingLeft) row.style.paddingLeft = paddingLeft;

  const barBg = document.createElement('div');
  barBg.className = 'heat-bar-bg';
  const bar = document.createElement('div');
  bar.className = 'heat-bar';
  bar.style.width = heat + '%';

  const shadeHot = heat >= 61 ? '#E24B4A' : HEAT_COLORS.shade;
  const colors = { ray: HEAT_COLORS.ray, arc: HEAT_COLORS.arc, shade: shadeHot };
  const color = colors[char] || '#888';
  bar.style.background = heat >= 91 ? 'linear-gradient(90deg,#E24B4A,#BA7517)' : color;

  barBg.appendChild(bar);

  const num = document.createElement('span');
  num.className = 'heat-num';
  num.style.color = heat >= 91 ? '#E24B4A' : color;
  num.textContent = heat >= 100 ? '🔥' : String(heat);

  row.appendChild(barBg);
  row.appendChild(num);
  return row;
}

// === (K) スコアボタンをDOM APIで安全に生成 ===
function createScoreButton(emoji, label) {
  const btn = document.createElement('button');
  btn.className = 'score-btn';
  const emojiSpan = document.createTextNode(emoji + ' ');
  const countSpan = document.createElement('span');
  countSpan.textContent = '0';
  btn.appendChild(emojiSpan);
  btn.appendChild(countSpan);
  return { btn, countSpan };
}

// === メッセージ追加 ===
function addMsg(char, text) {
  const isUser = char === 'user';
  const row = document.createElement('div');
  row.className = 'msg-row' + (isUser ? ' user' : '');

  const av = document.createElement('div');
  av.className = 'avatar' + (isUser ? ' user' : '');
  if (!isUser && IMAGES[char]) {
    const img = document.createElement('img');
    img.src = IMAGES[char];
    img.alt = char;
    av.appendChild(img);
  } else if (isUser) {
    av.textContent = (getUserName() || 'く').slice(0, 1);
  }

  const col = document.createElement('div');
  col.className = 'bubble-col';
  const nm = document.createElement('span');
  nm.className = 'char-name';
  nm.textContent = isUser ? (getUserName() || 'あなた') : (NAMES[char] || char);

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + char;
  bubble.textContent = (typeof text === 'object' && text.message) ? text.message : text;

  col.appendChild(nm);
  col.appendChild(bubble);

  if (!isUser) { row.appendChild(av); row.appendChild(col); }
  else { row.appendChild(col); row.appendChild(av); }
  msgsEl.appendChild(row);

  // 熱量バー (G) 共通関数使用
  if (!isUser && CHARS.includes(char) && typeof text._heat !== 'undefined' && text._heat > 0) {
    msgsEl.appendChild(createHeatBar(char, text._heat, '48px'));
  }

  // スコアボタン (K) DOM API使用
  if (!isUser && CHARS.includes(char)) {
    const scoreRow = document.createElement('div');
    scoreRow.className = 'score-row';
    scoreRow.style.paddingLeft = '48px';

    const like = createScoreButton('👍');
    const dislike = createScoreButton('👎');
    let voted = false;

    like.btn.addEventListener('click', () => {
      if (voted) return;
      voted = true;
      like.btn.classList.add('liked');
      sendScore(char, 'like', like.countSpan, dislike.countSpan);
    });
    dislike.btn.addEventListener('click', () => {
      if (voted) return;
      voted = true;
      dislike.btn.classList.add('disliked');
      sendScore(char, 'dislike', like.countSpan, dislike.countSpan);
    });

    const replyBtn = document.createElement('button');
    replyBtn.className = 'score-btn';
    replyBtn.textContent = '↩ 返信';
    replyBtn.addEventListener('click', () => {
      inputEl.value = '@' + char.charAt(0).toUpperCase() + char.slice(1) + ' ';
      inputEl.focus();
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
    });

    scoreRow.appendChild(like.btn);
    scoreRow.appendChild(dislike.btn);
    scoreRow.appendChild(replyBtn);
    msgsEl.appendChild(scoreRow);
  }

  msgsEl.scrollTop = msgsEl.scrollHeight;
}

// === (B) タイピングインジケーター（アバター付き） ===
function addTyping(id, char) {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = id;

  const av = document.createElement('div');
  av.className = 'avatar';
  if (char && IMAGES[char]) {
    const img = document.createElement('img');
    img.src = IMAGES[char];
    img.alt = char;
    av.appendChild(img);
  }

  const tb = document.createElement('div');
  tb.className = 'typing-bubble';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    tb.appendChild(d);
  }
  row.appendChild(av);
  row.appendChild(tb);
  msgsEl.appendChild(row);

// === Budget ===
function updateBudget(b) {
  if (!b) return;
  const used = b.usedJPY || 0;
  const limit = b.limitJPY || 500;
  const remaining = b.remainingJPY;
  const pct = Math.round(used / limit * 100);
  budgetEl.textContent = '¥' + used + ' / ¥' + limit + ' (' + pct + '%)';
  budgetEl.style.color = remaining < 100 ? '#e00' : remaining < 200 ? '#e87' : '#888';
}

// === (J) JSONP安全ラッパー ===
function jsonp(url, callbackPrefix, timeoutMs) {
  return new Promise((resolve, reject) => {
    const cb = callbackPrefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const sid = 'jsonp_' + cb;
    let settled = false;

    const cleanup = () => {
      settled = true;
      delete window[cb];
      document.getElementById(sid)?.remove();
    };

    const timer = setTimeout(() => {
      if (!settled) { cleanup(); reject(new Error('タイムアウトしました')); }
    }, timeoutMs || 35000);

    window[cb] = function(data) {
      if (settled) return; // (J) タイムアウト後の遅延応答を無視
      clearTimeout(timer);
      cleanup();
      resolve(data);
    };

    const s = document.createElement('script');
    s.id = sid;
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    s.onerror = () => {
      if (!settled) { clearTimeout(timer); cleanup(); reject(new Error('通信エラーが発生しました')); }
    };
    document.body.appendChild(s);
  });
}

// === Score送信 ===
function sendScore(char, type, likeSpan, dislikeSpan) {
  const url = GAS_URL + '?action=score&char=' + char + '&type=' + type + '&user=' + encodeURIComponent(getUserName() || 'guest');
  jsonp(url, 'score', 15000).then(data => {
    if (data.scores) {
      updateIntroScores(data.scores);
      if (data.favChar) window._favChar = data.favChar;
      const s = data.scores[char];
      if (s) {
        likeSpan.textContent = s.like;
        dislikeSpan.textContent = s.dislike;
      }
    }
  }).catch(e => console.warn('Score送信失敗:', e));
}

// === (K) Intro スコア表示をDOM APIで安全に ===
function updateIntroScores(scores) {
  CHARS.forEach(char => {
    const el = document.getElementById('star-' + char);
    if (!el) return;
    const s = scores[char];
    if (!s || s.total === 0) {
      el.textContent = '';
      const empty = document.createElement('span');
      empty.style.cssText = 'color:#ccc;font-size:11px';
      empty.textContent = '評価なし';
      el.appendChild(empty);
      return;
    }
    const full = Math.floor(s.star);
    const half = (s.star - full) >= 0.5 ? 1 : 0;
    const empty = 5 - full - half;

    el.textContent = '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);

    const countSpan = document.createElement('span');
    countSpan.className = 'char-star-count';
    countSpan.textContent = '(' + s.star.toFixed(1) + ')';
    el.appendChild(countSpan);

    const detailDiv = document.createElement('div');
    detailDiv.style.cssText = 'font-size:10px;color:#888;margin-top:2px';
    detailDiv.textContent = '👍' + s.like + ' 👎' + s.dislike;
    el.appendChild(detailDiv);
  });
}

async function loadWeather(areaCode) {
  try {
    const res = await fetch(JMA_FORECAST_URL + areaCode + '.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const ts = data[0].timeSeries;
    // 天気情報（最初のtimeSeries）
    const weatherAreas = ts[0].areas;
    const area = weatherAreas[0];
    const areaName = area.area.name;
    const todayCode = area.weatherCodes[0];
    const todayWeather = area.weathers ? area.weathers[0] : '';
    // 短い天気表現に整形
    const shortWeather = todayWeather.replace(/　/g, ' ').split(/\s/)[0] || todayWeather;

    // 明日の天気（あれば）
    let tomorrowCode = '';
    let tomorrowDesc = '';
    if (area.weatherCodes.length > 1) {
      tomorrowCode = area.weatherCodes[1];
      tomorrowDesc = area.weathers ? (area.weathers[1] || '').replace(/　/g, ' ').split(/\s/)[0] : '';
    }

    // 気温（2番目または3番目のtimeSeriesから取得）
    let tempHigh = '', tempLow = '';
    for (let i = 1; i < ts.length; i++) {
      const tempAreas = ts[i].areas;
      if (tempAreas && tempAreas[0] && tempAreas[0].temps) {
        const temps = tempAreas[0].temps;
        if (temps.length >= 2) {
          tempLow = temps[0];
          tempHigh = temps[1];
        } else if (temps.length === 1) {
          tempHigh = temps[0];
        }
        break;
      }
    }

    // UI更新
    const bar = document.getElementById('weather-bar');
    document.getElementById('weather-icon').textContent = getWeatherEmoji(todayCode);
    document.getElementById('weather-area').textContent = areaName;
    document.getElementById('weather-desc').textContent = shortWeather;
    document.getElementById('weather-high').textContent = tempHigh ? tempHigh + '°' : '--';
    document.getElementById('weather-low').textContent = tempLow ? tempLow + '°' : '--';

    if (tomorrowCode) {
      document.getElementById('weather-tomorrow-icon').textContent = getWeatherEmoji(tomorrowCode);
      document.getElementById('weather-tomorrow-desc').textContent = tomorrowDesc || '---';
    }

    bar.classList.add('visible');

    // キャラ別天気コメントをチャットに投稿
    const weatherInfo = { areaName, todayWeather, shortWeather, todayCode, tomorrowCode, tomorrowDesc, tempHigh, tempLow };
    addWeatherComments(weatherInfo);
  } catch (e) {
    console.warn('天気予報の取得に失敗:', e);
  }
}

// === キャラ別天気コメント生成 ===
function addWeatherComments(w) {
  const high = Number(w.tempHigh) || null;
  const low = Number(w.tempLow) || null;
  const code = Number(w.todayCode) || 0;
  const isRain = code >= 300 && code < 400;
  const isSnow = code >= 400 && code < 500;
  const isCloudyRain = (code >= 200 && code < 300) && String(w.todayCode).match(/02|06|07|08|09/);
  const willRain = isRain || isSnow || isCloudyRain;
  const tomorrowRain = (Number(w.tomorrowCode) >= 300 && Number(w.tomorrowCode) < 400) ||
                       (Number(w.tomorrowCode) >= 400 && Number(w.tomorrowCode) < 500);

  // --- Ray: 天気予報全般 ---
  let rayMsg = w.areaName + 'の今日の天気は' + w.shortWeather + '。';
  if (high && low) {
    rayMsg += '最高' + high + '°C、最低' + low + '°C。';
  } else if (high) {
    rayMsg += '最高気温は' + high + '°C。';
  }
  if (w.tomorrowDesc) {
    rayMsg += '明日は' + w.tomorrowDesc + 'の予報だよ。';
  }
  addMsg('ray', rayMsg);

  // --- Arc: 気温に応じた服装アドバイス ---
  let arcMsg = '';
  const ref = high || low;
  if (ref !== null) {
    if (ref >= 30) {
      arcMsg = '今日は暑くなりそうだね！通気性のいい服で、水分もこまめに取ってね。熱中症に気をつけて。';
    } else if (ref >= 25) {
      arcMsg = '半袖でちょうどいい気温だね。日差しが強いなら帽子やサングラスもあると安心だよ。';
    } else if (ref >= 20) {
      arcMsg = '過ごしやすい気温だね。薄手の長袖か、羽織るもの一枚あると調節しやすいよ。';
    } else if (ref >= 15) {
      arcMsg = '少し肌寒いかも。長袖にカーディガンとか、重ね着で調節するのがおすすめだよ。';
    } else if (ref >= 10) {
      arcMsg = 'しっかり冷えるから、ジャケットやコートを忘れずにね。暖かくして出かけよう。';
    } else if (ref >= 5) {
      arcMsg = 'かなり寒いよ！厚手のコートにマフラーや手袋もあった方がいいかも。';
    } else {
      arcMsg = '真冬の寒さだね…ダウンコートにしっかり防寒して。外に出るなら完全装備で！';
    }
  } else {
    arcMsg = '気温データが取れなかったけど、体調に合わせて無理しない服装にしてね。';
  }
  addMsg('arc', arcMsg);

  // --- Shade: 傘が必要かどうか ---
  let shadeMsg = '';
  if (isRain) {
    shadeMsg = '今日は雨だぞ。傘持ってけ。忘れて濡れても知らねーからな。';
  } else if (isSnow) {
    shadeMsg = '雪だってさ。傘いるだろ、当然。足元も滑るから気をつけろよ。';
  } else if (isCloudyRain) {
    shadeMsg = '曇りだけど雨降るかもな。折りたたみ傘くらい突っ込んどけ。';
  } else if (tomorrowRain) {
    shadeMsg = '今日は傘いらねーけど、明日は降りそうだ。明日の準備は今日のうちにしとけ。';
  } else {
    shadeMsg = '今日は傘いらねーよ。身軽に行ってこい。';
  }
  addMsg('shade', shadeMsg);
}

// === Daily ===
function loadDaily() {
  const areaParam = new URLSearchParams(window.location.search).get('area') || '190000';
  const url = GAS_URL + '?action=daily&area=' + areaParam;

  jsonp(url, 'daily', 20000).then(data => {
    if (!data.daily) return;
    let replies = [];
    if (Array.isArray(data.daily)) {
      replies = data.daily;
    } else if (typeof data.daily === 'string') {
      try { replies = JSON.parse(data.daily); } catch (e) { replies = parseReplies(data.daily, 'arc'); }
    }
    if (!replies || replies.length === 0) return;

    const section = document.getElementById('daily-section');
    const content = document.getElementById('daily-content');
    content.textContent = ''; // (K) innerHTMLの代わり

    replies.forEach(r => {
      const row = document.createElement('div');
      row.className = 'daily-row';
      const av = document.createElement('div');
      av.className = 'daily-avatar';
      const img = document.createElement('img');
      img.src = IMAGES[r.char] || IMAGES.arc;
      av.appendChild(img);
      const bubble = document.createElement('div');
      bubble.className = 'daily-bubble';
      bubble.textContent = r.message;
      row.appendChild(av);
      row.appendChild(bubble);
      content.appendChild(row);

      if (r.heat) {
        content.appendChild(createHeatBar(r.char, r.heat, '34px'));
      }
    });

    section.style.display = 'none';
    // チャットエリアに今日の一言を表示
    replies.forEach(r => {
      addMsg(r.char, { message: r.message, _heat: r.heat || 0 });
    });
  }).catch(e => {
    console.warn('Daily取得失敗:', e); // (H) 空catchではなくwarnを出す
  });
}

// === API呼び出し ===
function callAPI(userMessage) {
  const url = GAS_URL + '?action=chat&user=' + encodeURIComponent(getUserName() || 'anonymous') + '&message=' + encodeURIComponent(userMessage);
  return jsonp(url, 'chat', 35000).then(data => {
    if (data.error === 'BUDGET_EXCEEDED') throw new Error(data.message);
    if (data.error) throw new Error(data.message || data.error);
    if (data.budget) updateBudget(data.budget);
    return data.reply || '';
  });
}

// === レスポンスパーサー ===
function parseReplies(raw, fallbackChar) {
  fallbackChar = fallbackChar || 'arc';
  // JSON配列パース
  try {
    const trimmed = raw.trim();
    if (trimmed.startsWith('[')) {
      const a = JSON.parse(trimmed);
      if (Array.isArray(a) && a.length > 0) return a;
    }
  } catch (e) { /* JSONパース失敗は想定内 */ }

  try {
    const m = raw.match(/\[[\s\S]*\]/);
    if (m) {
      const a = JSON.parse(m[0]);
      if (Array.isArray(a) && a.length > 0) return a;
    }
  } catch (e) { /* JSONパース失敗は想定内 */ }

  // "ray:... / arc:... / shade:..." 形式
  if (raw.includes(' / ')) {
    const parts = raw.split(' / ');
    const result = [];
    for (const part of parts) {
      const colon = part.indexOf(':');
      if (colon > 0) {
        const char = part.slice(0, colon).trim().toLowerCase();
        const message = part.slice(colon + 1).trim();
        if (CHARS.includes(char)) result.push({ char, message });
      }
    }
    if (result.length > 0) return result;
  }

  return [{ char: fallbackChar, message: raw }];
}

// === チャットフロー ===
async function runConversation(userText) {
  hideError();
  isSending = true; // (E)
  sendBtn.disabled = true;
  addMsg('user', userText);

  // メンションキャラを検出（フォールバック用）
  const mentionMatch = userText.match(/@(Ray|Arc|Shade)/i);
  const fallbackChar = mentionMatch ? mentionMatch[1].toLowerCase() : 'arc';

  // (B) タイピング時にfallbackCharのアバターを表示
  addTyping('typing', fallbackChar);

  try {
    const raw = await callAPI(userText);
    removeTyping('typing');
    const replies = parseReplies(raw, fallbackChar);
    replies.forEach(r => {
      addMsg(r.char, { message: r.message, _heat: r.heat || 0 });
    });
  } catch (err) {
    removeTyping('typing');
    showError(err.message || 'エラーが発生しました');
  }
  isSending = false; // (E)
  sendBtn.disabled = false;
  inputEl.focus();
}

// === 送信ハンドラ ===
function handleSend() {
  if (isSending) return; // (E) 二重送信防止
  currentMode === 'name_input' ? submitName() : submitChat();
}

function submitName() {
  const name = inputEl.value.trim();
  if (!name) return;
  setUserName(name);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  inputEl.placeholder = 'メッセージを入力...';
  currentMode = 'chat';
  updateLoginInfo();
  addMsg('arc', 'よろしく、' + getDisplayName() + '！何でも話しかけてね。');
}

function submitChat() {
  const t = inputEl.value.trim();
  if (!t || sendBtn.disabled || isSending) return; // (E)
  inputEl.value = '';
  inputEl.style.height = 'auto';
  runConversation(t);
}

function switchToNameInput() {
  inputEl.placeholder = 'あなたのお名前を入力...';
  currentMode = 'name_input';
  updateLoginInfo();
  addMsg('arc', 'はじめまして！あなたのお名前を教えてください。');
}
